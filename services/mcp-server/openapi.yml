  /api/v2/rawmodel/{id}/addFormats:
    post:
      summary: Add converted formats to the model
      operationId: addConvertedFormatsToTheModel
      description: 'This endpoint starts the conversion process to the provided target
        formats. The conversion process is asynchronous and can take some time to
        complete.

        The status of the conversion can be checked using the `processedFormats` endpoint.'
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Formats conversion started.
                  formats:
                  - gltf
                  - usdz
                properties:
                  message:
                    type: string
                    example: Formats conversion started.
                  formats:
                    type: array
                    example:
                    - gltf
                    - usdz
                    items:
                      type: string
        '400':
          description: error
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Model already has the following format(s) exported: gltf,
                    usdz'
                properties:
                  message:
                    type: string
                    example: 'Model already has the following format(s) exported:
                      gltf, usdz'
        '404':
          description: error
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Model with this ID was not found!
                properties:
                  message:
                    type: string
                    example: Model with this ID was not found!
      tags:
      - Base Asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                formats:
                  type: array
                  description: An array of formats to convert the model to.
                  example:
                  - gltf
                  - usdz
                  items:
                    type: string
              required:
              - formats
