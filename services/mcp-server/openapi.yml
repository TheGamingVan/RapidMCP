  /api/v2/rawmodel/api-upload/start:
    post:
      summary: Create Base Asset - Get Upload Link
      operationId: createBaseAssetGetUploadLink
      description: "This endpoint initiates a new base asset upload process and returns:\n\
        1. An ID for the new base asset\n2. Pre-signed URLs for direct file uploads\
        \ to our s3 storage\n\nUpload Process:\n1. Call this endpoint to get the upload\
        \ URLs\n2. For each file in the s3_upload_urls:\n   - Upload the file using\
        \ an HTTP PUT request to the provided URL\n3. After ALL files are uploaded,\
        \ call the complete_upload URL to finalize the process\n\nStep by Step Usage:\n\
        1. Upload mymodel.glb:\n   - curl -X PUT -T \"mymodel.glb\" \"use-signed-url-for-glb\"\
        \n2. Upload material.mat:\n   - curl -X PUT -T \"material.mat\" \"use-signed-url-for-mat\"\
        \n3. Finally, call the complete_upload URL:\n   - curl -X GET \"use-complete-upload-url\""
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  links:
                    s3_upload_urls:
                      mymodel.glb: signed url for mymodel.glb
                      material.mat: signed url for material.mat
                    complete_upload: https://api.rapidpipeline.com/api/v2/rawmodels/1/api-upload/complete
                properties:
                  id:
                    type: integer
                    example: 1
                  links:
                    type: object
                    properties:
                      s3_upload_urls:
                        type: object
                        properties:
                          mymodel.glb:
                            type: string
                            example: signed url for mymodel.glb
                          material.mat:
                            type: string
                            example: signed url for material.mat
                      complete_upload:
                        type: string
                        example: https://api.rapidpipeline.com/api/v2/rawmodels/1/api-upload/complete
      tags:
      - Base Asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model_name:
                  type: string
                  description: The name of the base asset
                  example: teapot
                  nullable: false
                filenames:
                  type: array
                  description: The names of the files to be uploaded (including the
                    extension)
                  example:
                  - mymodel.glb
                  - material.mat
                  items:
                    type: string
                is_zip:
                  type: boolean
                  description: Indicate if the file is a zip
                  example: null
                  nullable: true
              required:
              - model_name
              - filenames
  /api/v2/rawmodel/{id}/api-upload/complete:
    get:
      summary: Create Base Asset - Complete Upload
      operationId: createBaseAssetCompleteUpload
      description: "Final step in the upload process. Call this endpoint after:\n\
        1. Getting upload URLs from \"Create Base Asset - Get Upload Link\"\n2. Uploading\
        \ all files to S3 using the provided signed URLs\n\nExample:\n1. Start: POST\
        \ /api/v2/rawmodel/api-upload/start\n   - Receive upload URLs and base asset\
        \ ID\n2. Upload: PUT each file to S3 using their respective signed URL\n \
        \  - curl -X PUT -T \"mymodel.glb\" \"signed_url_from_response\"\n3. Complete:\
        \ GET /api/v2/rawmodel/{id}/api-upload/complete\n   - Triggers processing\
        \ of your uploaded files\n\nAfter completion:\n- Your model will begin processing\n\
        - Use our \"analysis_finished\" webhook to get notified when ready for optimization"
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 281
                    name: teapot
                    processing: false
                    upload_status: complete
                    size: 438680
                    created_at: '2021-02-08T16:59:52+01:00'
                    rapid_models:
                    - 635
                    - 617
                    scale_factor: '10'
                    downloads:
                      error.log: signed url for the error.log
                      info.log: signed url for the info.log
                      metrics.json: signed url for the metrics.json
                      rpd_info.json: signed url for the rpd_info.json
                      teapot.obj: signed url for the uploaded file
                      thumb.jpg: signed url for the thumb.jpg
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 281
                        nullable: true
                      name:
                        type: string
                        example: teapot
                      processing:
                        type: boolean
                        example: false
                      upload_status:
                        type: string
                        example: complete
                      size:
                        type: integer
                        example: 438680
                        nullable: true
                      created_at:
                        type: string
                        example: '2021-02-08T16:59:52+01:00'
                      rapid_models:
                        type: array
                        example:
                        - 635
                        - 617
                        items:
                          type: integer
                          nullable: true
                        nullable: true
                      scale_factor:
                        type: string
                        example: '10'
                      downloads:
                        type: object
                        properties:
                          error.log:
                            type: string
                            example: signed url for the error.log
                          info.log:
                            type: string
                            example: signed url for the info.log
                          metrics.json:
                            type: string
                            example: signed url for the metrics.json
                          rpd_info.json:
                            type: string
                            example: signed url for the rpd_info.json
                          teapot.obj:
                            type: string
                            example: signed url for the uploaded file
                          thumb.jpg:
                            type: string
                            example: signed url for the thumb.jpg
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The ID received from the start endpoint
      example: 281
      required: true
      schema:
        type: integer
