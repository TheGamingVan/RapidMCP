  /api/v2/rapidmodel/{id}/renders:
    get:
      summary: Get QC render files for a rapid model
      operationId: getQCRenderFilesForARapidModel
      description: 'Returns hash signed links for the quality control images generated
        after optimization.


        The keys of the images are built with the following reasoning:

        `<format>-<source of the image>-<name of the image>.png`


        <format> refers to the 3D output format of the optimization

        <source of the image> can be either ''comparison'' or ''original''


        In case the image depicts the differences between the input asset and its
        comparison renders,

        its key will contain a __diff suffix. References to the renders of the original
        raw model are also included.


        With that said, the keys of the images for an optimization that generated
        a glb output will be:

        - "glb-back.png"

        - "glb-bottom.png"

        - "glb-front.png"

        - "glb-left.png"

        - "glb-right.png"

        - "glb-top.png"

        - "glb-back__diff.png"

        - "glb-bottom__diff.png"

        - "glb-front__diff.png"

        - "glb-left__diff.png"

        - "glb-right__diff.png"

        - "glb-top__diff.png"

        - "original-back.png"

        - "original-bottom.png"

        - "original-front.png"

        - "original-left.png"

        - "original-right.png"

        - "original-top.png"


        Only available for Base Assets that were optimized after 2024-07'
      parameters: []
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: ''
        '404':
          description: error
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
      - Rapid Model
    parameters:
    - in: path
      name: id
      description: The id of the Base Asset
      example: 281
      required: true
      schema:
        type: integer
