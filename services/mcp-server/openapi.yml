  '/api/v2/rapidmodel/{id}/renders':
    get:
      summary: 'Get QC render files for a rapid model'
      operationId: getQCRenderFilesForARapidModel
      description: "Returns hash signed links for the quality control images generated after optimization.\n\nThe keys of the images are built with the following reasoning:\n`<format>-<source of the image>-<name of the image>.png`\n\n<format> refers to the 3D output format of the optimization\n<source of the image> can be either 'comparison' or 'original'\n\nIn case the image depicts the differences between the input asset and its comparison renders,\nits key will contain a __diff suffix. References to the renders of the original raw model are also included.\n\nWith that said, the keys of the images for an optimization that generated a glb output will be:\n- \"glb-back.png\"\n- \"glb-bottom.png\"\n- \"glb-front.png\"\n- \"glb-left.png\"\n- \"glb-right.png\"\n- \"glb-top.png\"\n- \"glb-back__diff.png\"\n- \"glb-bottom__diff.png\"\n- \"glb-front__diff.png\"\n- \"glb-left__diff.png\"\n- \"glb-right__diff.png\"\n- \"glb-top__diff.png\"\n- \"original-back.png\"\n- \"original-bottom.png\"\n- \"original-front.png\"\n- \"original-left.png\"\n- \"original-right.png\"\n- \"original-top.png\"\n\nOnly available for Base Assets that were optimized after 2024-07"
      parameters: []
      responses:
        200:
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: ''
        404:
          description: error
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - 'Rapid Model'
    parameters:
      -
        in: path
        name: id
        description: 'The id of the Base Asset'
        example: 281
        required: true
        schema:
          type: integer
