tags:
- name: API Tokens
  description: Endpoints to manage tokens of the user account.
- name: Base Asset
  description: "Base Assets are sometimes referred to as raw models or source models\
    \ in tutorials or elsewhere in the docs.\nBase asset is a user uploaded model.\
    \ All future processing is applied to these assets only.\n\nThis is where you\
    \ find endpoints some critical endpoints:\n  - Uploading a model\n  - Optimizing\
    \ a model\n  - Read 3D Metadata of the uploaded model\n  - Get running jobs (we\
    \ suggest you to check webhooks though)\n  - Find all optimized versions of a\
    \ base asset\n\n### What happens to uploaded files?\n\nEach base asset upload\
    \ will trigger some analysis process to generate 3D metadata and render images\n\
    for using that file in an easier way in downstream processes. You are going to\
    \ find this data when\nyou call Get Base Asset endpoint and look at .json or image\
    \ files inside the data -> downloads.\n\n### Automatically exported models\n\n\
    If the uploaded model is a CAD file, we will also automatically output a .glb\
    \ and .usd version of it.\nIf the uploaded model is a 3ds Max file, we will automatically\
    \ output a .glb, .gltf, .fbx, and .usdz\nversion of it while translating all V-ray\
    \ materials to PBR materials. Read reference documentation of\nDCC Importer for\
    \ more information on this topic.\n\n### Base Asset Endpoints\n\nHere are all\
    \ the base asset endpoints:"
- name: Embeds
  description: 'Endpoints for managing embeddable 3D viewers created from Rapid Models.

    Embeds can only be created from optimized Rapid Models, not directly from Base
    Assets.


    Here are all the embed related endpoints:'
- name: Presets
  description: 'These are saved 3D Processor Settings for you to organize your assets
    better. Rapid Models carry on the preset information through which they are created,
    this way you can understand which Rapid Model was created through which preset.


    In order to create a preset, the preset has to comply to the rules of the 3D processing
    schema. Please find related reference docs [here](https://docs.rapidpipeline.com/docs/componentDocs/3dProcessingSchemaSettings/processor-schema-overview).


    In most cases, it is probably best if you create your preset using our UI and
    then refer to its preset ID in relevant API calls when necessary.


    Here are all preset related endpoints:'
- name: Rapid Model
  description: 'These are sometimes referred to as optimized models. They are created
    by processing the base assets

    through 3D Processor (making a POST call to Optimize endpoint of Base Asset).


    Here are all rapid model related endpoints:'
- name: Tags
  description: API for listing all of base asset and rapid model tags.
- name: User
  description: APIs for managing user profile.
- name: Webhooks
  description: "RapidPipeline uses webhooks to notify your application when an event\
    \ happens in your account.\nWebhooks are particularly useful for upload and optimization\
    \ events. Instead of polling the API to know the status\nof your upload or optimization,\
    \ RapidPipeline sends an event to your webhook.\n\nBegin using webhooks with your\
    \ RapidPipeline integration in just three steps:\n1. Create a webhook endpoint\
    \ on your server\n2. [Register](https://app.rapidpipeline.com/webhooks) the endpoint\
    \ with RapidPipeline to go live\n3. Test your endpoint by clicking the test button\
    \ in the [webhooks page](https://app.rapidpipeline.com/webhooks)\n\n### What are\
    \ webhooks\nThe webhook endpoint is just more code on your server, which could\
    \ be written in Ruby, PHP, Node.js, or whatever.\nThe webhook endpoint has an\
    \ associated URL (e.g., https://example.com/webhooks).\nThe RapidPipeline notifications\
    \ are Event objects sent as POST requests (Fire-and-forget, no retry).\nThis Event\
    \ object contains all the relevant information about what just happened, including\
    \ the type of event and the data associated with that event.\nThe webhook endpoint\
    \ uses the event details to take any required actions, such as indicating that\
    \ an optimization should be done.\n\n### Validation\nIn order to validate an incoming\
    \ webhook event you need to first set up a secret when creating it on RapidPipeline.\
    \ This secret will be used to sign the body and send the signature as part of\
    \ the requests header. You can use this secret on your receiving endpoint to validate\
    \ the content of the body by signing it with the same secret. For an example check\
    \ out this repository: https://github.com/DGG3D/webhook-api-example\n\n### Optimization\
    \ Events\nRapidPipeline sends the \"optimization_finished\" event. You can see\
    \ an example on the right side\n```\n  {\n   \"event_type\": \"optimization_finished\"\
    ,\n   \"timestamp\": \"2023-01-19T15:03:08.076920Z\",\n   \"data\": {\n     \"\
    status\": \"Successful\",\n     \"message\": \"Optimization has ended and your\
    \ rapid model is available to download.\",\n     \"rawmodel_id\": 1961,\n    \
    \ \"rapidmodel_id\": 4213,\n     \"rapidmodel\": {\n       \"rapid.glb\": \"link\
    \ to rapid model\"\n     }\n   }\n }\n```\n\n### Upload Events\nRapidPipeline\
    \ sends an \"analysis_finished\" event when your uploaded model has been finished\
    \ being analyzed and is now ready to be optimized. You can see an two examples\
    \ for the successful and failed state on the right side.\n\nFor uploaded zip files\
    \ RapidPipeline sends an \"unzip_finished\" event when your model has been finished\
    \ being unzipped and is going to be analysed next. You can see an two examples\
    \ for the successful and failed state on the right side.\n\n```\n  {\n   \"event_type\"\
    : \"analysis_finished\",\n   \"timestamp\": \"2023-01-02T15:03:08.076920Z\",\n\
    \   \"data\": {\n     \"status\": \"Successful\",\n     \"message\": \"Model analysis\
    \ has ended and your base asset is ready to be optimized.\",\n     \"rawmodel_id\"\
    : 1961,\n   }\n }\n```\n```\n  {\n   \"event_type\": \"analysis_finished\",\n\
    \   \"timestamp\": \"2023-01-02T15:03:08.076920Z\",\n   \"data\": {\n     \"status\"\
    : \"Failed\",\n     \"message\": \"Analysis failed\",\n     \"rawmodel_id\": 1961,\n\
    \   }\n }\n```\n```\n  {\n   \"event_type\": \"unzip_finished\",\n   \"timestamp\"\
