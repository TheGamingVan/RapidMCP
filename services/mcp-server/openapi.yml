                              type: string
                              example: TVBench
      tags:
      - Base Asset
  /api/v2/rawmodel/{id}:
    get:
      summary: Get Base Asset
      operationId: getBaseAsset
      description: "Returns detailed information about an uploaded 3D model asset,\
        \ including its processing status,\nmetadata, and available downloads. Use\
        \ this endpoint to monitor upload status or use our webhook\nto get notified\
        \ when the upload is complete.\n\nKey Field `upload_status`\n\nThe `upload_status`\
        \ field tracks the model's progress through various processing stages.\n\n\
        Most important values are:\n- \"complete\": All processing completed successfully\n\
        - \"Importing Failed\": General processing failure\n\nOther values are:\n\
        - \"incomplete\": Initial state, upload not yet finished\n- \"waiting\": Upload\
        \ complete, waiting to start processing\n- \"unzipping\": Extracting uploaded\
        \ files\n- \"analysing\": Analyzing model structure and contents\n- \"dataprepping\"\
        : Preparing data for processing\n- \"dataprepping failed\": Data preparation\
        \ encountered an error\n- \"RapidQC\": Model is in quality control phase\n\
        - \"Importing Failed Import Limit Exceeded\": Processing failed due to import\
        \ limits\n\nError Handling:\n1. Check `upload_status` first:\n   - \"complete\"\
        \ indicates successful processing\n\n2. If `has_errors` is true:\n   - Set\
        \ to true if RapidPipeline 3D Processor creates a error.log file with errors\n\
        \   - Check \"error.log\" in the downloads section for details"
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: object
                    additionalProperties: true
                required:
                - data
              example:
                data:
                  id: 281
                  uuid: 123e4567-e89b-12d3-a456-426614174000
                  name: teapot
                  external: false
                  upload_status: complete
                  import_status: null
                  progress: null
                  error_message: null
                  size: 438680
                  created_at: '2021-02-08T16:59:52+01:00'
                  scale_factor: '10'
                  has_errors: false
                  format: glb
                  tags:
                  - id: 241
                    name: Mid-Poly
                    created_at: '2022-12-12 13:12:37+00'
                    updated_at: '2022-12-12 13:12:37+00'
                    raw_id: 281
                  metadata: null
                  downloads:
                    error.log: signed url for the error.log
                    info.log: signed url for the info.log
                    metrics.json: signed url for the metrics.json
                    rpd_info.json: signed url for the rpd_info.json
                    teapot.obj: signed url for the teapot.obj
                    thumb.jpg: signed url for the thumb.jpg
      tags:
      - Base Asset
    delete:
      summary: Delete Base Asset
      operationId: deleteBaseAsset
      description: ''
      parameters: []
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
      - Base Asset
    put:
      summary: Update Base Asset - Add Tags, Set scale factor
      operationId: updateBaseAssetAddTagsSetScaleFactor
      description: A tag can have 255 utf-8 characters including whitespaces
      parameters: []
      responses: {}
      tags:
      - Base Asset
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  description: A list of tags that will be added to the base asset
                  example:
                  - low poly
                  - mb target
                  items:
                    type: string
                scale_factor:
                  type: number
                  description: The new scale factor that will be applied to the base
                    asset
                  example: 0.5
                  nullable: false
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/downloads:
    get:
      summary: Get Download URLs
      operationId: getDownloadURLs
      description: Returns a list of urls to download the individual base asset files
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  RezColorChecker.mtl: signed s3 url
                  RezColorChecker.obj: signed s3 url
                  RezColorChecker.png: signed s3 url
                properties:
                  RezColorChecker.mtl:
                    type: string
                    example: signed s3 url
                  RezColorChecker.obj:
                    type: string
                    example: signed s3 url
                  RezColorChecker.png:
                    type: string
                    example: signed s3 url
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/downloads/converted:
    get:
      summary: Get Download URLs for converted files.
      operationId: getDownloadURLsForConvertedFiles
      description: Returns a list of urls to download the individual converted formats
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  RezColorChecker.usdz: signed s3 url
                  RezColorChecker.obj: signed s3 url
                  RezColorChecker.fbx: signed s3 url
                properties:
                  RezColorChecker.usdz:
                    type: string
                    example: signed s3 url
                  RezColorChecker.obj:
                    type: string
                    example: signed s3 url
                  RezColorChecker.fbx:
                    type: string
                    example: signed s3 url
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/downloads/pbr:
    get:
      summary: Get imported DCC files
      operationId: getImportedDCCFiles
      description: Returns a list of urls to download the individual converted DCC
        material and quality control files
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  materials:
                    type: object
                    additionalProperties: true
                  qc:
                    type: object
                    additionalProperties: true
              example:
                materials:
                  ao.png: signed s3 url
                  diffuse.png: signed s3 url
                qc:
                  render_0.png: signed s3 url
                  render_1.png: signed s3 url
                  diff_0.png: signed s3 url
                  diff_1.png: signed s3 url
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/downloads/zip:
    get:
      summary: Download zip
      operationId: downloadZip
      description: 'Downloads all model files as zip.


        A stream is returned which contains the model data.'
      parameters: []
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: Streamed response
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/renders:
    get:
      summary: Get QC render files for a base asset
      operationId: getQCRenderFilesForABaseAsset
      description: 'Returns hash signed links for the quality control images generated
        after importing the Rawmodel


        The keys of the images are built with the following reasoning:

        `<format>-<name of the image>.png`


        `<format>` refers to the 3D input format to be optimized


        With that said, the keys of the images for an input usdz will be:

        - "usdz-back.png"

        - "usdz-bottom.png"

        - "usdz-front.png"

        - "usdz-left.png"

        - "usdz-right.png"

        - "usdz-top.png"


        Only available for Rawmodels that were imported after 2024-07'
      parameters: []
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: ''
        '404':
          description: error
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the Rawmodel
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/{id}/tags/{tagId}:
    delete:
      summary: Delete Tag of a Base Asset
      operationId: deleteTagOfABaseAsset
      description: ''
      parameters: []
      responses: {}
      tags:
      - Base Asset
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
    - in: path
      name: tagId
      description: The id of the tag that will be deleted
      example: 2
      required: true
      schema:
        type: integer
  /api/v2/rawmodel:
    get:
      summary: Get Base Assets
      operationId: getBaseAssets
      description: Paginated response of your base assets. Search for base assets
        by name or tag. Omit the optional query parameters to list all base assets.
      parameters:
      - in: query
        name: q
        description: Optional. Search term to filter base assets by name or tag.
          Omit to return all base assets.
        example: '"Low-Poly"'
        required: false
        schema:
          type: string
          description: Optional. Search term to filter base assets by name or tag.
          example: '"Low-Poly"'
          nullable: false
      - in: query
        name: page
        description: Optional. Page number for pagination. Defaults to 1. If the requested
          page exceeds the maximum available (based on total assets and items per
          page), the last available page will be returned.
        example: 3
        required: false
        schema:
          type: integer
          description: Optional. Page number for pagination. Defaults to 1. If the
            requested page exceeds the maximum available (based on total assets and
            items per page), the last available page will be returned.
          example: 3
          nullable: false
      - in: query
        name: itemsPerPage
        description: Optional. Number of items per page. Defaults to 10. Maximum is
          50.
        example: 25
        required: false
        schema:
          type: integer
          description: Optional. Number of items per page. Defaults to 10. Maximum
            is 50.
          example: 25
          nullable: false
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                  - id: 1
                    name: teapot
                    external: false
                    upload_status: complete
                    size: 315088
                    created_at: '2022-05-24T15:05:47+02:00'
                    scale_factor: '1'
                    has_errors: true
                    format: fbx
                    tags:
                    - id: 1
                      name: Low-Poly
                      created_at: '2022-05-24 15:06:03'
