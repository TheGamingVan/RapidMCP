openapi: 3.0.3
info:
  title: RapidPipeline API v2 Documentation
  description: All endpoints return JSON unless explicitly documented otherwise. Optional
    query parameters may be omitted to list all results. Use bearer token
    authentication unless noted.
  version: 1.0.0
servers:
- url: https://api.rapidpipeline.com
paths:
  /api/v2/user/tokens:
    get:
      summary: Get Tokens
      operationId: getTokens
      description: ''
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                  properties:
                    id:
                      type: integer
                      example: 222
                    name:
                      type: string
                      example: name of api token
                    last_used_at:
                      type: string
                      example: '2021-09-01T11:21:22.000000Z'
                    created_at:
                      type: string
                      example: '2021-09-01T10:26:57.000000Z'
                    optimization_count:
                      type: integer
                      example: 42
              example:
              - id: 222
                name: name of api token
                last_used_at: '2021-09-01T11:21:22.000000Z'
                created_at: '2021-09-01T10:26:57.000000Z'
                optimization_count: 42
      tags:
      - API Tokens
  /api/v2/user/tokens/create:
    post:
      summary: Create Token
      operationId: createToken
      description: ''
      parameters: []
      responses:
        '200':
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: 234|y5NGBTJk5OX5Zva5RfxTz0GkXEL9axN79vTfsJOH
      tags:
      - API Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the API token
                  example: name of new api token
                  nullable: false
              required:
              - name
  /api/v2/user/tokens/{id}:
    delete:
      summary: Delete Token
      operationId: deleteToken
      description: ''
      parameters: []
      responses: {}
      tags:
      - API Tokens
    get:
      summary: Get Token
      operationId: getToken
      description: ''
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  tokenable_type: App\Models\User
                  tokenable_id: 45
                  name: name of api token
                  abilities:
                  - '*'
                  last_used_at: null
                  created_at: '2021-10-26T10:38:07.000000Z'
                  updated_at: '2021-10-26T10:38:07.000000Z'
                  plain_text: ''
                properties:
                  id:
                    type: integer
                    example: 1
                  tokenable_type:
                    type: string
                    example: App\Models\User
                  tokenable_id:
                    type: integer
                    example: 45
                  name:
                    type: string
                    example: name of api token
                  abilities:
                    type: array
                    example:
                    - '*'
                    items:
                      type: string
                  last_used_at:
                    type: string
                    example: null
                    nullable: true
                  created_at:
                    type: string
                    example: '2021-10-26T10:38:07.000000Z'
                  updated_at:
                    type: string
                    example: '2021-10-26T10:38:07.000000Z'
                  plain_text:
                    type: string
                    example: ''
      tags:
      - API Tokens
    parameters:
    - in: path
      name: id
      description: The id of the API token
      example: 42
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/optimize/{id}:
    post:
      summary: Optimize
      operationId: optimize
      description: 'There are two ways to optimize a base asset:


        In the first way send a config as a json object that complies with the [3D
        Processor Schema](https://docs.rapidpipeline.com/docs/componentDocs/3dProcessingSchemaSettings/processor-schema-overview),
        or send the id of one of your presets or of a factoryPreset


        You can use our "optimization_finished" webhook to get notified when your
        model has been optimized. It also includes downloadlinks to your optimized
        model'
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 281
                  name: teapot.obj
                  optimization_status: sent_to_queue
                  job_status:
                    id: 518
                    job_id: null
                    type: App\Jobs\ProcessRawModel
                    queue: null
                    attempts: 0
                    progress_now: 0
                    progress_max: 0
                    status: queued
                    input: null
                    output: null
                    created_at: '2021-02-15T13:34:52.000000Z'
                    updated_at: '2021-02-15T13:34:52.000000Z'
                    started_at: null
                    finished_at: null
                    key: rapid_model:624
                  progress: 0
                  processing_step: Scheduled for processing
                  external: null
                  rawmodel:
                    id: 282
                    name: teapot.obj
                    processing: true
                properties:
                  id:
                    type: integer
                    example: 281
                    nullable: true
                  name:
                    type: string
                    example: teapot.obj
                  optimization_status:
                    type: string
                    example: sent_to_queue
                  job_status:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 518
                        nullable: true
                      job_id:
                        type: string
                        example: null
                        nullable: true
                      type:
                        type: string
                        example: App\Jobs\ProcessRawModel
                      queue:
                        type: string
                        example: null
                        nullable: true
                      attempts:
                        type: integer
                        example: 0
                        nullable: true
                      progress_now:
                        type: integer
                        example: 0
                        nullable: true
                      progress_max:
                        type: integer
                        example: 0
                        nullable: true
                      status:
                        type: string
                        example: queued
                      input:
                        type: string
                        example: null
                        nullable: true
                      output:
                        type: string
                        example: null
                        nullable: true
                      created_at:
                        type: string
                        example: '2021-02-15T13:34:52.000000Z'
                      updated_at:
                        type: string
                        example: '2021-02-15T13:34:52.000000Z'
                      started_at:
                        type: string
                        example: null
                        nullable: true
                      finished_at:
                        type: string
                        example: null
                        nullable: true
                      key:
                        type: string
                        example: rapid_model:624
                  progress:
                    type: integer
                    example: 0
                    nullable: true
                  processing_step:
                    type: string
                    example: Scheduled for processing
                  external:
                    type: string
                    example: null
                    nullable: true
                  rawmodel:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 282
                        nullable: true
                      name:
                        type: string
                        example: teapot.obj
                      processing:
                        type: boolean
                        example: true
      tags:
      - Base Asset
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  description: The config of the optimizer as a json object complying
                    with the [3D Processor Schema](https://docs.rapidpipeline.com/docs/componentDocs/3dProcessingSchemaSettings/processor-schema-overview).
                    Do not use config in combination with preset_id. They are mutually
                    exclusive
                  example:
                    import:
                      general:
                        rotateZUp: false
                        fixAnimationData: false
                        normalmapYFlip: false
                      USD:
                        profile: arkit
                        purpose: render
                      CAD:
                        tessellationResolution: fine
                      discard:
                        cameras: false
                        lights: false
                        animations: false
                        morphTargets: false
                        unusedUVs: false
                    export:
                    - fileName: ''
                      textureMapFilePrefix: ''
                      discard: []
                      format:
                        gltf:
                          pbrMaterial: []
                  nullable: false
                  properties: {}
                preset_id:
                  type: integer
                  description: The id one of your presets or of a factoryPreset. Do
                    not use preset_id in combination with config. They are mutually
                    exclusive
                  example: null
                  nullable: true
                tags:
                  type: array
                  description: A list of tags that will be added to the rapid model
                  example:
                  - Low-Poly
                  - MyTag
                  items:
                    type: string
    parameters:
    - in: path
      name: id
      description: The id of the base asset
      example: 281
      required: true
      schema:
        type: integer
  /api/v2/rawmodel/optimize:
    post:
      summary: Multi Optimize
      operationId: multiOptimize
      description: 'Optimizes multiple models with one request


        Use the same format as in the optimization endpoint but pass it in an array
        which contains the request as config (preset_id or config as json object)
        and the model_id of the base assets you want to process


        Look at the example request for the data structure


        You can use our "optimization_finished" webhook to get notified when your
        model has been optimized. It also includes download links to your optimized
        model'
      parameters: []
      responses:
        '204':
          description: success
        '422':
          description: error
          content:
            text/plain:
              schema:
                type: string
                example: 'Could not process request: Missing required parameter'
        '500':
          description: error
          content:
            text/plain:
              schema:
                type: string
                example: 'An error occurred while processing your request: ...'
      tags:
      - Base Asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                optimizations:
                  type: array
                  description: The array containing the models and configurations
                    you want to process
                  example:
                  - model_id: 89
                    config:
                      preset_id: 2004
                      tags:
                      - Lens Studio 3D
                      - Medium Resolution
                      - Low-Poly
                      exportName: calibrationTarget.glb
                  - model_id: 77
                    config:
                      preset_id: 2004
                      tags:
                      - Lens Studio 3D
                      - Medium Resolution
                      - Mid-Poly
                      exportName: DamagedHelmet.glb
                  items:
                    type: string
              required:
              - optimizations
  /api/v2/rawmodel/jobs:
    get:
      summary: Get Running Jobs
      operationId: getRunningJobs
      description: Returns rapidmodels (until 1 week) that are still being processed
        or were not successfully optimized
      parameters: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                  - id: 5812
                    name: TVBench
                    optimization_status: failed
                    job_status:
                      id: 3601
                      job_id: edab51b2-1c47-4a0f-b807-58e913dbabc9
                      type: App\Jobs\ProcessRawModel
                      queue: default
                      attempts: 1
                      progress_now: 100
                      progress_max: 100
                      status: finished
                      input: null
                      output: '{"exit_code":1}'
                      created_at: '2021-10-11 20:08:52'
                      updated_at: '2021-10-11 20:08:53'
                      started_at: '2021-10-11 20:08:52'
                      finished_at: '2021-10-11 20:08:53'
                      key: rapid_model:5812
                    progress: 100
                    processing_step: Done
                    external: false
                    rawmodel:
                      id: 2257
                      name: TVBench
                properties:
                  data:
                    type: array
                    example:
                    - id: 5812
                      name: TVBench
                      optimization_status: failed
                      job_status:
                        id: 3601
                        job_id: edab51b2-1c47-4a0f-b807-58e913dbabc9
                        type: App\Jobs\ProcessRawModel
                        queue: default
                        attempts: 1
                        progress_now: 100
                        progress_max: 100
                        status: finished
                        input: null
                        output: '{"exit_code":1}'
                        created_at: '2021-10-11 20:08:52'
                        updated_at: '2021-10-11 20:08:53'
                        started_at: '2021-10-11 20:08:52'
                        finished_at: '2021-10-11 20:08:53'
                        key: rapid_model:5812
                      progress: 100
                      processing_step: Done
                      external: false
                      rawmodel:
                        id: 2257
                        name: TVBench
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        id:
                          type: integer
                          example: 5812
                        name:
                          type: string
                          example: TVBench
                        optimization_status:
                          type: string
                          example: failed
                        job_status:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 3601
                            job_id:
                              type: string
                              example: edab51b2-1c47-4a0f-b807-58e913dbabc9
                            type:
                              type: string
                              example: App\Jobs\ProcessRawModel
                            queue:
                              type: string
                              example: default
                            attempts:
                              type: integer
                              example: 1
                            progress_now:
                              type: integer
                              example: 100
                            progress_max:
                              type: integer
                              example: 100
                            status:
                              type: string
                              example: finished
                            input:
                              type: string
                              example: null
                              nullable: true
                            output:
                              type: string
                              example: '{"exit_code":1}'
                            created_at:
                              type: string
                              example: '2021-10-11 20:08:52'
                            updated_at:
                              type: string
                              example: '2021-10-11 20:08:53'
                            started_at:
                              type: string
                              example: '2021-10-11 20:08:52'
                            finished_at:
                              type: string
                              example: '2021-10-11 20:08:53'
                            key:
                              type: string
                              example: rapid_model:5812
                        progress:
                          type: integer
