openapi: 3.0.3
info:
  title: Dummy Widgets API
  version: 1.0.0
  description: A fake API for local MCP testing.
servers:
  - url: http://localhost:9000
paths:
  /health:
    get:
      operationId: health_check
      summary: Health check
      responses:
        '200':
          description: OK
  /widgets:
    get:
      operationId: list_widgets
      summary: List widgets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A list of widgets
  /widgets/{widget_id}:
    get:
      operationId: get_widget
      summary: Get a widget by ID
      parameters:
        - name: widget_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Widget detail
        '404':
          description: Not found
  /search:
    get:
      operationId: search_widgets
      summary: Search widgets
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
  /stats:
    get:
      operationId: get_stats
      summary: Get stats
      responses:
        '200':
          description: Stats payload
